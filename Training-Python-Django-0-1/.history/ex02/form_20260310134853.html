<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title>Contact Form</title>
</head>

<body>
	<h1>Contact Form</h1>

	<form>
		<label>Firstname: <input type="text" id="firstname"></label><br>
		<label>Name: <input type="text" id="name"></label><br>
		<label>Age: <input type="number" id="age"></label><br>
		<label>Phone: <input type="tel" id="phone"></label><br>
		<label>Email: <input type="email" id="email"></label><br>
		<label><input type="checkbox" id="student"> Student at 42</label><br>
		<label>Gender:</label><br>
		<label><input type="radio" name="gender" id="gender_male" value="Male"> Male</label>
		<label><input type="radio" name="gender" id="gender_female" value="Female"> Female</label>
		<label><input type="radio" name="gender" id="gender_other" value="Other"> Other</label>
		<br>
		<button onclick="displayFormContents();">Submit</button>
	</form>

	<script src="popup.js"></script>
</body>

</html>
